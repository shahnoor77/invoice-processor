services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: invoice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend (serves API + React frontend) ────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    env_file: .env
    environment:
      # Override DATABASE_URL to use the internal docker network hostname
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/invoice_db
    volumes:
      - ./google_credentials.json:/app/google_credentials.json:ro
      - invoice_temp:/tmp
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  invoice_temp:
