services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: invoice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── InvoiceIQ API + Frontend ──────────────────────────────────────────────────
  api:
    image: shahnoor77/invoiceiq:latest
    container_name: invoiceiq-api   # fixed name so Watchtower can find it
    restart: unless-stopped
    ports:
      - "85:80"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/invoice_db
    volumes:
      - ./google_credentials.json:/app/google_credentials.json:ro
      - invoice_temp:/tmp
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Watchtower — auto-pulls new images from Docker Hub ──────────────────────
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300   # check every 5 minutes
      - WATCHTOWER_CLEANUP=true        # remove old images after update
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL:-}
    command: invoiceiq-api             

volumes:
  postgres_data:
  invoice_temp:
