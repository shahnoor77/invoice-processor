---
invoice_file_detection_and_intake:
  description: >
    Invoice files have been uploaded at: {intake_source}

    CRITICAL: You MUST use the pdf_text_extractor tool for PDF files and image_text_extractor
    for image files (PNG, JPG). Use the EXACT file paths listed above.
    Do NOT make up or guess any invoice data.

    Steps:
    1. Identify each file path
    2. Call the correct tool for each file
    3. Include ALL extracted text in your output verbatim
  expected_output: >
    The COMPLETE raw extracted text from each file, exactly as returned by the tool.
    Do not summarize, paraphrase, or modify the extracted text in any way.
    Include every line, number, and character exactly as extracted.
  agent: document_intake_specialist

structured_data_extraction:
  description: >
    You are a data extraction specialist. Extract invoice data from the raw text below.
    Copy values EXACTLY as they appear. Do not calculate, round, or modify any value.

    RAW INVOICE TEXT:
    ---
    {ocr_text}
    ---

    RULES:
    - sender = party who issued/sent the invoice (vendor, seller, top of page)
    - receiver = party who receives/pays the invoice (bill to, client, buyer)
    - line_items = ONLY actual products or services sold. NEVER include discount rows,
      tax rows, shipping rows, subtotal rows, total rows, or balance rows as line items.
      Those go in their dedicated fields: discount_total, tax_amount, shipping, total_amount, amount_due.
    - A line item with no unit_price AND no quantity is a summary row — exclude it.
    - invoice_number: search for INV-, #, No., Invoice No, Ref. Copy exactly with prefix.
    - dates: YYYY-MM-DD format
    - numeric fields: numbers only, no currency symbols
    - missing fields: null
    - Only enter the valid numerical values even if written differently in the text (e.g. "00.00"= 0.0 ,one hundred dollars" = 100, "50%" = 50, "$1,000.00" = 1000)
    Output ONLY this JSON with values filled in (no explanation, no markdown, no extra text):
    {"sender":{"name":null,"address":null,"city":null,"state":null,"zip":null,"country":null,"phone":null,"email":null,"website":null,"tax_id":null,"vat_number":null,"registration_number":null,"bank":{"bank_name":null,"account_holder":null,"account_number":null,"iban":null,"swift_bic":null,"routing_number":null,"sort_code":null,"branch":null,"bank_address":null}},"receiver":{"name":null,"address":null,"city":null,"state":null,"zip":null,"country":null,"phone":null,"email":null,"tax_id":null,"vat_number":null,"bank":{"bank_name":null,"account_holder":null,"account_number":null,"iban":null,"swift_bic":null,"routing_number":null,"sort_code":null,"branch":null}},"invoice_number":null,"invoice_date":null,"due_date":null,"delivery_date":null,"purchase_order":null,"payment_terms":null,"payment_method":null,"reference":null,"line_items":[{"description":null,"quantity":null,"unit":null,"unit_price":null,"discount_percent":null,"discount_amount":null,"tax_percent":null,"tax_amount":null,"total":null}],"subtotal":null,"discount_total":null,"discount_percent":null,"tax_rate":null,"tax_amount":null,"tax_type":null,"shipping":null,"handling":null,"other_charges":null,"total_amount":null,"amount_paid":null,"amount_due":null,"deposit":null,"currency":null,"exchange_rate":null,"notes":null,"terms_and_conditions":null,"confidence":"HIGH"}
  expected_output: >
    Valid JSON only — the template above filled with real values from the invoice text.
    line_items contains ONLY products/services, never discount/tax/total rows.
    All fields extracted verbatim. Null only for truly missing fields.
  agent: data_extraction_specialist

invoice_data_validation:
  description: >
    Validate the extracted invoice JSON from the previous step.
    Check: math (line items sum to subtotal, subtotal + tax = total), completeness,
    and flag any suspicious values.
    Do NOT modify the extracted values — only report issues.
  expected_output: >
    Validation report with PASS/FAIL for each check and list of any issues found.
  agent: data_validation_analyst
  context:
  - structured_data_extraction

erp_system_integration:
  description: >
    Push validated invoice data to {erp_system}.
    Report the integration status.
  expected_output: >
    Integration status: SUCCESS or FAILED with reason.
  agent: erp_integration_specialist
  context:
  - invoice_data_validation

finance_team_notification:
  description: >
    Notify the finance team via {notification_channel} about the processed invoice.
    Include invoice number, total, vendor, and processing status.
  expected_output: >
    Confirmation that notification was sent with summary of what was communicated.
  agent: finance_notification_coordinator
  context:
  - erp_system_integration
