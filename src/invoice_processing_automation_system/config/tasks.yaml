---
invoice_file_detection_and_intake:
  description: >
    Invoice files have been uploaded at: {intake_source}

    CRITICAL: You MUST use the pdf_text_extractor tool for PDF files and image_text_extractor
    for image files (PNG, JPG). Use the EXACT file paths listed above.
    Do NOT make up or guess any invoice data.

    Steps:
    1. Identify each file path
    2. Call the correct tool for each file
    3. Include ALL extracted text in your output verbatim
  expected_output: >
    The COMPLETE raw extracted text from each file, exactly as returned by the tool.
    Do not summarize, paraphrase, or modify the extracted text in any way.
    Include every line, number, and character exactly as extracted.
  agent: document_intake_specialist

structured_data_extraction:
  description: >
    Extract invoice data from the raw text below. Copy values EXACTLY as they appear.
    Do not round, convert, reformat, or calculate any value.

    RAW INVOICE TEXT (copy values from here only):
    ---
    {ocr_text}
    ---

    IDENTIFICATION RULES — read carefully:
    - "sender" = the party who ISSUED/CREATED/SENT the invoice. Look for: FROM, VENDOR, SELLER,
      SUPPLIER, BILLED BY, INVOICE FROM, company letterhead at top, logo name, "We are pleased to
      invoice you", PAYABLE TO, REMIT TO, BANK DETAILS OF SELLER
    - "receiver" = the party who RECEIVES/PAYS the invoice. Look for: TO, BILL TO, SHIP TO,
      CLIENT, CUSTOMER, BUYER, SOLD TO, INVOICE TO, ATTENTION
    - NEVER merge sender and receiver into one object
    - If only one party is shown, it is the SENDER

    BANK DETAILS RULES:
    - Extract bank details for BOTH sender and receiver if present
    - Bank fields: bank_name, account_number, iban, swift_bic, routing_number, sort_code,
      account_holder, branch, bank_address
    - Sender bank = where payment should be SENT TO
    - Receiver bank = buyer's bank details (if shown)

    STRICT RULES:
    - INVOICE NUMBER is critical — search for: INV-, #, No., Number, Invoice No, Ref, Reference,
      Invoice ID. Copy EXACTLY including prefix. Never null if any reference exists.
    - Copy every number EXACTLY as written
    - Dates must be YYYY-MM-DD format
    - Numeric fields: numbers only, no currency symbols
    - If a field is not in the text, set it to null
    - Copy ALL line items — do not skip any
    - Do NOT perform any arithmetic

    Output ONLY valid JSON, no explanation, no markdown:
    {
      "sender": {
        "name": null, "address": null, "city": null, "state": null, "zip": null,
        "country": null, "phone": null, "email": null, "website": null,
        "tax_id": null, "vat_number": null, "registration_number": null,
        "bank": {
          "bank_name": null, "account_holder": null, "account_number": null,
          "iban": null, "swift_bic": null, "routing_number": null,
          "sort_code": null, "branch": null, "bank_address": null
        }
      },
      "receiver": {
        "name": null, "address": null, "city": null, "state": null, "zip": null,
        "country": null, "phone": null, "email": null,
        "tax_id": null, "vat_number": null,
        "bank": {
          "bank_name": null, "account_holder": null, "account_number": null,
          "iban": null, "swift_bic": null, "routing_number": null,
          "sort_code": null, "branch": null
        }
      },
      "invoice_number": null,
      "invoice_date": null,
      "due_date": null,
      "delivery_date": null,
      "purchase_order": null,
      "payment_terms": null,
      "payment_method": null,
      "reference": null,
      "line_items": [
        {
          "description": null, "quantity": null, "unit": null,
          "unit_price": null, "discount_percent": null, "discount_amount": null,
          "tax_percent": null, "tax_amount": null, "total": null
        }
      ],
      "subtotal": null,
      "discount_total": null,
      "discount_percent": null,
      "tax_rate": null,
      "tax_amount": null,
      "tax_type": null,
      "shipping": null,
      "handling": null,
      "other_charges": null,
      "total_amount": null,
      "amount_paid": null,
      "amount_due": null,
      "deposit": null,
      "currency": null,
      "exchange_rate": null,
      "notes": null,
      "terms_and_conditions": null,
      "confidence": "HIGH"
    }
  expected_output: >
    Valid JSON only. Values copied verbatim from the raw invoice text.
    Sender and receiver must be separate with their own bank details.
    Invoice number must never be null if any reference exists.
    All financial fields extracted. Null only for truly missing fields.
  agent: data_extraction_specialist

invoice_data_validation:
  description: >
    Validate the extracted invoice JSON from the previous step.
    Check: math (line items sum to subtotal, subtotal + tax = total), completeness,
    and flag any suspicious values.
    Do NOT modify the extracted values — only report issues.
  expected_output: >
    Validation report with PASS/FAIL for each check and list of any issues found.
  agent: data_validation_analyst
  context:
  - structured_data_extraction

erp_system_integration:
  description: >
    Push validated invoice data to {erp_system}.
    Report the integration status.
  expected_output: >
    Integration status: SUCCESS or FAILED with reason.
  agent: erp_integration_specialist
  context:
  - invoice_data_validation

finance_team_notification:
  description: >
    Notify the finance team via {notification_channel} about the processed invoice.
    Include invoice number, total, vendor, and processing status.
  expected_output: >
    Confirmation that notification was sent with summary of what was communicated.
  agent: finance_notification_coordinator
  context:
  - erp_system_integration
